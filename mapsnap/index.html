<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Truth Georef</title>
    <script type="module" crossorigin src="/mapsnap/assets/index-BJNyJSjU.js"></script>
    <link rel="stylesheet" crossorigin href="/mapsnap/assets/index-B4IcMbte.css">
  </head>
  <body>
    <div class="container">
      <textarea rows="50" cols="40"></textarea>
      <div class="image-column">
        <img />
        <div class="drop-placeholder">Drop image here</div>
        <div class="image-controls">
          <input type="checkbox" id="show-intersections-on-image" checked />
          <label for="show-intersections-on-image"
            >Show intersections on image</label
          >
        </div>
        <div class="image-controls">
          <input type="checkbox" id="color-by-inlier" checked />
          <label for="color-by-inlier"
            >Color inliers/outliers differently</label
          >
        </div>
        <div id="detection-filters" style="display: none">
          <div class="filter-row">
            <label for="filter-confidence"
              >Min confidence:
              <span id="filter-confidence-value">0.150</span></label
            >
            <input
              type="range"
              id="filter-confidence"
              min="0"
              max="1"
              step="0.001"
              value="0.15"
            />
          </div>
          <div class="filter-row">
            <label for="filter-short-side"
              >Min short side:
              <span id="filter-short-side-value">20</span></label
            >
            <input
              type="range"
              id="filter-short-side"
              min="0"
              max="500"
              step="1"
              value="20"
            />
          </div>
          <div class="filter-row">
            <label for="filter-long-side"
              >Min long side: <span id="filter-long-side-value">60</span></label
            >
            <input
              type="range"
              id="filter-long-side"
              min="0"
              max="2000"
              step="1"
              value="60"
            />
          </div>
        </div>
      </div>
      <div class="map-column">
        <div id="map"></div>
        <div id="detections-panel" style="display: none">
          <table id="detections-table">
            <thead>
              <tr>
                <th>Angle</th>
                <th>Long</th>
                <th>Short</th>
                <th>Conf</th>
                <th>Text</th>
                <th>Image</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="opacity-control">
          <label for="opacity-slider">Opacity</label>
          <input
            type="range"
            id="opacity-slider"
            min="0"
            max="100"
            value="85"
          />
          <span id="opacity-value">85%</span>
        </div>
        <div class="opacity-control">
          <input type="checkbox" id="show-labels" checked />
          <label for="show-labels">Show street labels on map</label>
        </div>
        <div class="opacity-control">
          <input type="checkbox" id="show-intersections" checked />
          <label for="show-intersections">Show intersection GCPs on map</label>
        </div>
      </div>
    </div>
  </body>
</html>
